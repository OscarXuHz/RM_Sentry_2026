common:
    lid_topic:  "/livox/lidar" 
    # lid_topic:  "/livox/lidar"
    # imu_topic: "/livox/imu"
    # 老订阅 
    imu_topic:  "/livox/imu"

    con_frame: false # true: if you need to combine several LiDAR frames into one
    con_frame_num: 1 # the number of frames combined
    cut_frame: false # true: if you need to cut one LiDAR frame into several subframes
    cut_frame_time_interval: 0.1 # should be integral fraction of 1 / LiDAR frequency
    time_lag_imu_to_lidar:  0 # Time offset between LiDAR and IMU calibrated by other algorithms, e.g., LI-Init (find in Readme)
                               # the timesample of IMU is transferred from the current timeline to LiDAR's timeline by subtracting this value
    #time_lag_imu_to_lidar: 0.0

preprocess:
    lidar_type: 1 
    scan_line: 6
    timestamp_unit: 1           # the unit of time/t field in the PointCloud2 rostopic: 0-second, 1-milisecond, 2-microsecond, 3-nanosecond.
    blind: 1.2 

mapping:
    imu_en: true
    start_in_aggressive_motion: false # if true, a preknown gravity should be provided in following gravity_init
    extrinsic_est_en: false # for aggressive motion, set this variable false
    imu_time_inte: 0.005 # = 1 / frequency of IMU
    satu_acc: 3.0 # the saturation value of IMU's acceleration. not related to the units
    satu_gyro: 35 # the saturation value of IMU's angular velocity. not related to the units
    acc_norm:  1 # 1.0 for g as unit, 9.81 for m/s^2 as unit of the IMU's acceleration
    lidar_meas_cov: 0.001 # 0.001; 0.01
    acc_cov_output: 500
    gyr_cov_output: 1000 
    b_acc_cov: 0.0001 
    b_gyr_cov: 0.0001 
    imu_meas_acc_cov: 0.1 #0.1 # 0.1
    imu_meas_omg_cov: 0.1 #0.01 # 0.1
    gyr_cov_input: 0.01 # for IMU as input model
    acc_cov_input: 0.1 # for IMU as input model
    plane_thr: 0.1 # 0.05, the threshold for plane criteria, the smaller, the flatter a plane
    match_s: 81
    fov_degree: 180
    det_range: 450.0
    gravity_align: true # true to align the z axis of world frame with the direction of gravity, and the gravity direction should be specified below
    gravity: [0.0, 0.0, -9.810] # gravity to be aligned
    # gravity_init: [-0.118228, 0.724085, -9.268780] [-3.599104, -4.508789, -7.567698]
    gravity_init: [0.0, 0.0, -9.810]  # # preknown gravity in the first IMU body frame, use when imu_en is false or start from a non-stationary state
    # extrinsic_T: [-0.108496, -0.408326, -0.117286]  # 平移
    # extrinsic_R: [0.989644, -0.094101, 0.108399,    # 旋转矩阵  
    #           -0.101035, -0.993051, 0.060346,
    #           0.101967, -0.070673, -0.992274]
    extrinsic_T: [ 0.04165, 0.02326, -0.0284 ]
    extrinsic_R: [ 1, 0, 0,
                  0, 1, 0,
                   0, 0, 1 ]

    #edited after calibration 2026-01-12
    # REVERTED: arena-specific gravity_init overcorrects on new arenas.
    # The default [0,0,-9.81] is correct for stationary start on flat ground;
    # post-save floor leveling (PCA) handles residual tilt.
    # gravity_init: [-0.141128, -0.385181, -9.806548]  # OLD arena calibration — DO NOT USE
    # extrinsic_T: [0.013474, -0.120381, -0.014952]
    # # 旋转矩阵 - 使用优化后的4×4矩阵中的左上3×3子矩阵
    # extrinsic_R: [ 0.999995, -0.002498, -0.002008,
    #               -0.002491, -0.999989,  0.003862,
    #               -0.002017, -0.003857, -0.999991 ]
    # 第二次标定结果
    # extrinsic_T: [0.229036, 0.113910, 0.083106]
    # extrinsic_R: [ 0.999952,  0.006289, -0.007478,
    #                 0.006212, -0.999927, -0.010377,
    #              -0.007543,  0.010330, -0.999918 ]

odometry: 
    publish_odometry_without_downsample: false

publish:
    path_en: true                 # false: close the path output
    scan_publish_en: true         # false: close all the point cloud output
    scan_bodyframe_pub_en: false  # true: output the point cloud scans in IMU-body-frame

pcd_save:
    pcd_save_en: true
    interval: -1                   # -1 : all frames will be saved in ONE pcd file on shutdown
                                   # >0 : save every N LiDAR frames to separate files
    output_path: ""                # empty = default (ROOT_DIR/PCD/scans.pcd); set an absolute path to override
    level_floor: true              # post-process PCD: detect floor via PCA, rotate to level, shift Z
    floor_quantile: 0.08           # fraction of lowest-Z points used to identify the floor (0.08 = bottom 8%)
    floor_target_z: 0.0            # target Z height for the floor after normalization
    min_floor_points: 1000         # minimum number of floor points required (safety check)
